spring.application.name=renter-management

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/room_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=your-256-bit-secret-key-change-this-in-production-must-be-at-least-32-chars
app.jwt.expiration=86400000

# Server
server.port=8080
server.address=0.0.0.0

# Jackson — serialize LocalDate/LocalDateTime as ISO strings
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
# Serialize BigDecimal as plain number (not scientific notation) for Android Gson compatibility
spring.jackson.serialization.write-bigdecimal-as-plain=true

# File upload
app.upload.dir=uploads
app.base-url=http://192.168.1.243:8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
