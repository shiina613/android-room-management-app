spring.application.name=renter-management

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/room_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=your-256-bit-secret-key-change-this-in-production
app.jwt.expiration=86400000

# Server
server.port=8080
server.address=0.0.0.0
